<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quantity Measurement</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main class="auth-container">
    <div class="auth-card">

        <header class="auth-brand">
            <h1>Quantity Measurement</h1>
            <p>Compare, convert and calculate units</p>
        </header>

        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Sign Up</button>
        </div>

        <section class="tab-panel active" id="login-panel">
            <div class="alert" id="login-alert"></div>

            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com">
                <span class="field-error" id="login-email-err"></span>
            </div>

            <div class="form-group">
                <label for="login-pass">Password</label>
                <div class="pass-wrap">
                    <input type="password" id="login-pass" placeholder="Your password">
                    <button class="eye-btn" id="eye-login">show</button>
                </div>
                <span class="field-error" id="login-pass-err"></span>
            </div>

            <button class="btn-primary" id="login-btn">Login</button>
        </section>

        <section class="tab-panel" id="register-panel">
            <div class="alert" id="register-alert"></div>

            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="Your name">
                <span class="field-error" id="reg-name-err"></span>
            </div>

            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" placeholder="you@example.com">
                <span class="field-error" id="reg-email-err"></span>
            </div>

            <div class="form-group">
                <label for="reg-pass">Password (min 6 characters)</label>
                <div class="pass-wrap">
                    <input type="password" id="reg-pass" placeholder="Create a password">
                    <button class="eye-btn" id="eye-reg">show</button>
                </div>
                <span class="field-error" id="reg-pass-err"></span>
            </div>

            <button class="btn-primary" id="reg-btn">Create Account</button>
        </section>

    </div>
</main>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
