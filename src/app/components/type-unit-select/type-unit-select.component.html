<div class="form-row">

  <div class="form-group">
    <label class="op-label">{{ typeLabel }}</label>
    <select [ngModel]="selectedType" (ngModelChange)="onTypeChange($event)"
            [class.input-error]="typeError">
      <option value="">— Select —</option>
      <option *ngFor="let t of measurementTypes" [value]="t">{{ t }}</option>
    </select>
    <span class="field-error" [class.show]="typeError">{{ typeError }}</span>
  </div>

  <div class="form-group">
    <label class="op-label">{{ unitLabel }}</label>
    <select [ngModel]="selectedUnit" (ngModelChange)="onUnitChange($event)"
            [disabled]="!selectedType" [class.input-error]="unitError">
      <option value="">— Select type first —</option>
      <option *ngFor="let u of units" [value]="u">{{ u }}</option>
    </select>
    <span class="field-error" [class.show]="unitError">{{ unitError }}</span>
  </div>

</div>
