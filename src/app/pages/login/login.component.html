<div class="auth-container">
  <div class="auth-card glass fade-in">
    
    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-logo">🌌</div>
      <h1>QUANTUM <span class="accent">Engine</span></h1>
      <p>Precision measurement ecosystem.</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="tab-btn" [class.active]="activeTab === 'login'" (click)="switchTab('login')">
        Login
      </button>
      <button class="tab-btn" [class.active]="activeTab === 'register'" (click)="switchTab('register')">
        Sign Up
      </button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="tab-panel" [class.active]="activeTab === 'login'">
      <div *ngIf="loginAlert" class="alert-glass error">{{ loginAlert }}</div>

      <div class="pf-group">
        <label class="pf-label">Email Address</label>
        <input type="email" [(ngModel)]="loginEmail" class="pf-input" placeholder="you@example.com"
               [class.error]="loginEmailErr" (keydown.enter)="handleLogin()">
        <span class="field-error" *ngIf="loginEmailErr">{{ loginEmailErr }}</span>
      </div>

      <div class="pf-group">
        <label class="pf-label">Password</label>
        <div class="input-wrap">
          <input [type]="showLoginPass ? 'text' : 'password'"
                 [(ngModel)]="loginPassword" class="pf-input" placeholder="••••••••"
                 [class.error]="loginPassErr" (keydown.enter)="handleLogin()">
          <button class="eye-btn" type="button" (click)="toggleLoginPass()">
            {{ showLoginPass ? '🙈' : '👁' }}
          </button>
        </div>
        <span class="field-error" *ngIf="loginPassErr">{{ loginPassErr }}</span>
      </div>

      <button class="pf-btn pf-btn-hero mt-large" (click)="handleLogin()" [disabled]="loginLoading">
        <span *ngIf="loginLoading" class="spinner"></span>
        {{ loginLoading ? 'Authorizing...' : 'Enter Engine' }}
      </button>
    </div>

    <!-- REGISTER PANEL -->
    <div class="tab-panel" [class.active]="activeTab === 'register'">
      <div *ngIf="regAlert" class="alert-glass error">{{ regAlert }}</div>

      <div class="pf-group">
        <label class="pf-label">Full Name</label>
        <input type="text" [(ngModel)]="regName" class="pf-input" placeholder="Your Name"
               [class.error]="regNameErr">
        <span class="field-error" *ngIf="regNameErr">{{ regNameErr }}</span>
      </div>

      <div class="pf-group">
        <label class="pf-label">Email Address</label>
        <input type="email" [(ngModel)]="regEmail" class="pf-input" placeholder="you@example.com"
               [class.error]="regEmailErr">
        <span class="field-error" *ngIf="regEmailErr">{{ regEmailErr }}</span>
      </div>

      <div class="pf-group">
        <label class="pf-label">Password</label>
        <div class="input-wrap">
          <input [type]="showRegPass ? 'text' : 'password'"
                 [(ngModel)]="regPassword" class="pf-input" placeholder="Create a password"
                 [class.error]="regPassErr" (keydown.enter)="handleRegister()">
          <button class="eye-btn" type="button" (click)="toggleRegPass()">
            {{ showRegPass ? '🙈' : '👁' }}
          </button>
        </div>
        <span class="field-error" *ngIf="regPassErr">{{ regPassErr }}</span>
      </div>

      <div class="pf-group">
        <label class="pf-label">Confirm Password</label>
        <div class="input-wrap">
          <input [type]="showRegConfirmPass ? 'text' : 'password'"
                 [(ngModel)]="regConfirmPassword" class="pf-input" placeholder="Repeat your password"
                 [class.error]="regConfirmPassErr" (keydown.enter)="handleRegister()">
          <button class="eye-btn" type="button" (click)="toggleRegConfirmPass()">
            {{ showRegConfirmPass ? '🙈' : '👁' }}
          </button>
        </div>
        <span class="field-error" *ngIf="regConfirmPassErr">{{ regConfirmPassErr }}</span>
      </div>

      <button class="pf-btn pf-btn-hero mt-large" (click)="handleRegister()" [disabled]="regLoading">
        <span *ngIf="regLoading" class="spinner"></span>
        {{ regLoading ? 'Creating Identity...' : 'Register to Quantum' }}
      </button>
    </div>

  </div>
</div>
